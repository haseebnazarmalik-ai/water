<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pani Reminder - Sehat Awami</title>
    <style>
        :root { --primary: #0288d1; --secondary: #4caf50; --danger: #f44336; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; direction: rtl; }
        .app-container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); margin: 10px 0; }
        .status-card { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .btn-main { color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .btn-start { background: var(--secondary); }
        .btn-stop { background: var(--danger); }
        .next-box { margin: 15px 0; padding: 12px; background: #fff3e0; border-radius: 10px; font-weight: bold; color: #e65100; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .status-done { color: var(--secondary); font-weight: bold; }
        .status-pending { color: #999; }
        .done-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>💧 Pani Peeyo</h1>
        <div class="status-card">
            <p id="msg" style="margin:0 0 10px 0;">Reminder Status:</p>
            <button class="btn-main btn-start" id="toggle-btn">Start Reminders</button>
        </div>

        <div class="next-box" id="next-timer">Agla glass check ho raha hai...</div>

        <table>
            <thead>
                <tr>
                    <th>Waqt</th>
                    <th>Miqdar</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="schedule-list"></tbody>
        </table>
    </div>

    <div id="done-overlay" class="done-overlay">
        <h2 style="font-size: 2.5rem;">🔔 PANI PEEIN!</h2>
        <p id="notif-desc" style="font-size: 1.3rem; margin: 20px;"></p>
        <button class="btn-main btn-start" onclick="markDone()" style="width: 250px; font-size: 20px;">Maine Pi Liya ✅</button>
        <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>
    </div>

    <script>
        const schedule = [
            { id: 0, time: "07:00", label: "Subah Uthte hi", amount: "1-2 Glass" },
            { id: 1, time: "08:30", label: "Nashte se pehle", amount: "1 Glass" },
            { id: 2, time: "11:00", label: "Joints Lubrication", amount: "2 Glass" },
            { id: 3, time: "13:30", label: "Khane se pehle", amount: "1 Glass" },
            { id: 4, time: "16:30", label: "Energy Booster", amount: "2 Glass" },
            { id: 5, time: "18:30", label: "Toxins Removal", amount: "1 Glass" },
            { id: 6, time: "20:30", label: "Khane se pehle", amount: "1 Glass" },
            { id: 7, time: "22:00", label: "Haddiyon ki repair", amount: "1 Glass" }
        ];

        let currentTaskId = null;
        let snoozeInterval = null;
        let isRunning = localStorage.getItem('pani_running') === 'true';
        let logs = JSON.parse(localStorage.getItem('pani_logs') || '{}');

        // Check if day changed (Reset logs)
        const today = new Date().toDateString();
        if (localStorage.getItem('last_date') !== today) {
            logs = {};
            localStorage.setItem('last_date', today);
            localStorage.setItem('pani_logs', JSON.stringify(logs));
        }

        const list = document.getElementById('schedule-list');
        const overlay = document.getElementById('done-overlay');
        const sound = document.getElementById('notif-sound');

        function renderTable() {
            list.innerHTML = "";
            schedule.forEach(item => {
                const isDone = logs[item.id] === true;
                list.innerHTML += `
                    <tr>
                        <td>${item.time}</td>
                        <td>${item.amount}</td>
                        <td class="${isDone ? 'status-done' : 'status-pending'}">${isDone ? '✅ Done' : '⏳ Pending'}</td>
                    </tr>`;
            });
        }

        function updateButtonUI() {
            const btn = document.getElementById('toggle-btn');
            if (isRunning) {
                btn.innerText = "Stop Reminders";
                btn.className = "btn-main btn-stop";
                document.getElementById('msg').innerText = "✅ Reminders Chalu Hain";
            } else {
                btn.innerText = "Start Reminders";
                btn.className = "btn-main btn-start";
                document.getElementById('msg').innerText = "❌ Reminders Band Hain";
            }
        }

        document.getElementById('toggle-btn').onclick = async () => {
            if (!isRunning) {
                const permission = await Notification.requestPermission();
                isRunning = true;
            } else {
                isRunning = false;
                clearInterval(snoozeInterval);
            }
            localStorage.setItem('pani_running', isRunning);
            updateButtonUI();
        };

        setInterval(() => {
            if (!isRunning) return;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const task = schedule.find(t => t.time === timeStr);
            // Agar task mile aur wo pehle se done na ho
            if (task && !logs[task.id]) {
                currentTaskId = task.id;
                triggerAlarm(task);
            }
            
            const next = schedule.find(t => t.time > timeStr) || schedule[0];
            document.getElementById('next-timer').innerText = `Agla glass: ${next.time} (${next.label})`;
        }, 30000);

        function triggerAlarm(task) {
            document.getElementById('notif-desc').innerText = `${task.label}: ${task.amount} peeyein.`;
            overlay.style.display = 'flex';
            sound.play();
            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
            
            new Notification("💧 Pani Ka Waqt!", { body: task.label, requireInteraction: true });

            if (snoozeInterval) clearInterval(snoozeInterval);
            snoozeInterval = setInterval(() => {
                if (overlay.style.display === 'flex') {
                    sound.play();
                    new Notification("⚠️ Yaad Dehani!", { body: "Jaldi pani pi kar Done karein!" });
                }
            }, 300000); 
        }

        window.markDone = function() {
            overlay.style.display = 'none';
            sound.pause();
            sound.currentTime = 0;
            clearInterval(snoozeInterval);
            
            if (currentTaskId !== null) {
                logs[currentTaskId] = true;
                localStorage.setItem('pani_logs', JSON.stringify(logs));
                renderTable();
            }
        };

        // Initial Load
        renderTable();
        updateButtonUI();
    </script>
</body>
</html>
