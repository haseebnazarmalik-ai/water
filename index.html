<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pani Reminder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f9ff; font-family: sans-serif; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card p-8 max-w-sm w-full text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">Pani Reminder 💧</h1>
        
        <div class="my-6 p-4 bg-blue-50 rounded-lg">
            <p class="text-gray-600 text-sm">Aakhri baar pani piya:</p>
            <p id="lastTime" class="text-xl font-bold text-blue-800">Abhi tak nahi</p>
        </div>

        <button id="doneBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 mb-4">
            Main ne Pani Pi Liya! ✅
        </button>

        <button id="notifyBtn" class="text-sm text-gray-500 underline">
            Notifications On Karein 🔔
        </button>

        <div id="setupStatus" class="mt-4 hidden text-green-600 font-bold">!Setup Mukammal ✅</div>

        <div class="mt-6 p-2 border border-orange-300 border-dashed rounded text-[10px] text-gray-400 break-all">
            Token: <span id="tokenDisplay">Loading...</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-dl.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBR1pl7vYjxX8iRQ_0b5B9XDRM1u9jbjPI",
            authDomain: "water-aa9c4.firebaseapp.com",
            projectId: "water-aa9c4",
            storageBucket: "water-aa9c4.appspot.com",
            messagingSenderId: "1056342373059",
            appId: "1:1056342373059:web:968f230f89e496b864177c"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        const lastTimeDisplay = document.getElementById('lastTime');
        const doneBtn = document.getElementById('doneBtn');
        const tokenDisplay = document.getElementById('tokenDisplay');

        // Load last saved time from phone memory
        const savedTime = localStorage.getItem('lastDrink');
        if (savedTime) lastTimeDisplay.innerText = savedTime;

        // Done Button Logic
        doneBtn.addEventListener('click', () => {
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            lastTimeDisplay.innerText = now;
            localStorage.setItem('lastDrink', now);
            
            // Effect
            doneBtn.classList.replace('bg-blue-500', 'bg-green-500');
            setTimeout(() => doneBtn.classList.replace('bg-green-500', 'bg-blue-500'), 1000);
        });

        // Notification Setup
        document.getElementById('notifyBtn').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'BI5jSs1B8FxuSC_icOCaLbVMSD3IPfTKM6ieFjQOXMWUKD8yZCMkPOzYX24AsqocVh_dEUEOgOg282foqApOJIA' });
                tokenDisplay.innerText = token;
                document.getElementById('setupStatus').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
