<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pani Reminder - Sehat Awami</title>
    <link rel="manifest" href='data:application/json,{"name":"Pani Reminder","short_name":"Pani","start_url":"index.html","display":"standalone","background_color":"#ffffff","theme_color":"#0288d1","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3105/3105807.png","sizes":"512x512","type":"image/png"}]}'>
    
    <style>
        :root { --primary: #0288d1; --secondary: #4caf50; --danger: #f44336; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; direction: rtl; }
        .app-container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); margin: 10px 0; font-size: 24px; }
        .status-card { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .btn-main { color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-bottom: 10px; }
        .btn-start { background: var(--secondary); box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); }
        .btn-stop { background: var(--danger); box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3); }
        .next-box { margin: 15px 0; padding: 12px; background: #fff3e0; border-radius: 10px; font-weight: bold; color: #e65100; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; }
        .status-done { color: var(--secondary); font-weight: bold; }
        .status-pending { color: #999; }
        
        /* Full Screen Alarm Overlay */
        .done-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>💧 Pani Peeyo</h1>
        <div class="status-card">
            <p id="msg" style="margin:0 0 10px 0; font-weight: bold;">Reminder Status:</p>
            <button class="btn-main btn-start" id="toggle-btn">Start Reminders</button>
        </div>

        <div class="next-box" id="next-timer">Agla glass check ho raha hai...</div>

        <table>
            <thead>
                <tr>
                    <th>Waqt</th>
                    <th>Miqdar</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="schedule-list"></tbody>
        </table>
    </div>

    <div id="done-overlay" class="done-overlay">
        <h2 style="font-size: 2.5rem; color: #4fc3f7; margin: 0;">🔔 WAQT HO GAYA!</h2>
        <p id="notif-desc" style="font-size: 1.4rem; margin: 25px 0;"></p>
        <button class="btn-main btn-start" onclick="uiMarkDone()" style="width: 250px; font-size: 20px;">Maine Pi Liya ✅</button>
    </div>

    <script>
        const schedule = [
            { id: 0, time: "07:00", label: "Subah Uthte hi", amount: "1-2 Glass" },
            { id: 1, time: "08:30", label: "Nashte se pehle", amount: "1 Glass" },
            { id: 2, time: "11:00", label: "Joints Lubrication", amount: "2 Glass" },
            { id: 3, time: "13:30", label: "Dopahar se pehle", amount: "1 Glass" },
            { id: 4, time: "16:30", label: "Energy Booster", amount: "2 Glass" },
            { id: 5, time: "18:30", label: "Toxins Removal", amount: "1 Glass" },
            { id: 6, time: "20:30", label: "Raat khane se pehle", amount: "1 Glass" },
            { id: 7, time: "22:00", label: "Sone se pehle", amount: "1 Glass" }
        ];

        let isRunning = localStorage.getItem('pani_active') === 'true';
        let logs = JSON.parse(localStorage.getItem('pani_logs') || '{}');
        let currentTaskId = null;
        let snoozeInterval = null;

        // Reset logs daily
        const today = new Date().toDateString();
        if (localStorage.getItem('pani_date') !== today) {
            logs = {};
            localStorage.setItem('pani_date', today);
            localStorage.setItem('pani_logs', JSON.stringify(logs));
        }

        const listBody = document.getElementById('schedule-list');
        const overlay = document.getElementById('done-overlay');
        const toggleBtn = document.getElementById('toggle-btn');

        function renderTable() {
            listBody.innerHTML = "";
            schedule.forEach(item => {
                const isDone = logs[item.id] === true;
                listBody.innerHTML += `
                    <tr>
                        <td><b>${item.time}</b></td>
                        <td>${item.amount}</td>
                        <td class="${isDone ? 'status-done' : 'status-pending'}">${isDone ? '✅ Done' : '⏳ Pending'}</td>
                    </tr>`;
            });
        }

        function updateUI() {
            if (isRunning) {
                toggleBtn.innerText = "Stop Reminders";
                toggleBtn.className = "btn-main btn-stop";
                document.getElementById('msg').innerText = "✅ Reminders Chalu Hain";
            } else {
                toggleBtn.innerText = "Start Reminders";
                toggleBtn.className = "btn-main btn-start";
                document.getElementById('msg').innerText = "❌ Reminders Band Hain";
            }
        }

        toggleBtn.onclick = async () => {
            if (!isRunning) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    isRunning = true;
                    localStorage.setItem('pani_active', 'true');
                    updateUI();
                } else {
                    alert("Notification allow karein taake reminder mil sakein.");
                }
            } else {
                isRunning = false;
                localStorage.setItem('pani_active', 'false');
                clearInterval(snoozeInterval);
                updateUI();
            }
        };

        function checkTime() {
            if (!isRunning) return;
            const now = new Date();
            const nowStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            // Check for current task
            const task = schedule.find(t => t.time === nowStr);
            if (task && !logs[task.id] && overlay.style.display !== 'flex') {
                triggerNotification(task);
            }

            // Update next reminder display
            const next = schedule.find(t => t.time > nowStr) || schedule[0];
            document.getElementById('next-timer').innerText = `Agla glass: ${next.time} (${next.label})`;
        }

        function triggerNotification(task) {
            currentTaskId = task.id;
            document.getElementById('notif-desc').innerText = `${task.label} (${task.amount})`;
            overlay.style.display = 'flex';
            
            // System Notification (Mobile Tone)
            new Notification("💧 Pani Ka Waqt!", {
                body: `${task.label}: ${task.amount} peeyein.`,
                icon: "https://cdn-icons-png.flaticon.com/512/3105/3105807.png",
                requireInteraction: true
            });

            if ("vibrate" in navigator) navigator.vibrate([500, 300, 500]);

            // 5 Minute Snooze Logic
            if (snoozeInterval) clearInterval(snoozeInterval);
            snoozeInterval = setInterval(() => {
                if (overlay.style.display === 'flex') {
                    new Notification("⚠️ Dobara Yaad Dehani!", { body: "5 minute ho gaye, pani pi kar Done karein!" });
                    if ("vibrate" in navigator) navigator.vibrate([500, 300, 500]);
                }
            }, 300000); 
        }

        window.uiMarkDone = function() {
            overlay.style.display = 'none';
            clearInterval(snoozeInterval);
            if (currentTaskId !== null) {
                logs[currentTaskId] = true;
                localStorage.setItem('pani_logs', JSON.stringify(logs));
                renderTable();
                currentTaskId = null;
            }
        };

        // Run checking logic every 30 seconds
        setInterval(checkTime, 30000);
        
        // Initial Startup
        renderTable();
        updateUI();
        if(isRunning) checkTime();

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9Pnt9KTs=');
        }
    </script>
</body>
</html>
