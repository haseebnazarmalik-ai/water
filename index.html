<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pani Reminder - FCM Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; direction: rtl; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h1 { color: #0288d1; margin-bottom: 10px; }
        .btn { background: #2ecc71; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        #status { margin-top: 15px; font-weight: bold; color: #555; }
        #token-box { margin-top: 25px; padding: 15px; background: #fff3e0; border: 1px dashed #e65100; border-radius: 10px; font-size: 12px; word-break: break-all; display: none; text-align: left; direction: ltr; }
    </style>
</head>
<body>

<div class="card">
    <h1>💧 Pani Reminder</h1>
    <p>Proper Push Notifications active karne ke liye niche wala button dabayein aur "Allow" karein.</p>
    
    <button class="btn" id="setup-btn">🔔 Notifications On Karein</button>
    
    <p id="status">Status: Checking Firebase...</p>
    
    <div id="token-box">
        <b style="color: #e65100;">Aapka Registration Token:</b><br>
        <p id="token-text" style="margin: 10px 0; user-select: all;"></p>
        <small>(Ise copy karke mujhe bhejien)</small>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

<script>
    // Aapka Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBR1pl7vYjxX8iRQ_0b5B9XDRM1u9jbjPI",
        authDomain: "water-aa9c4.firebaseapp.com",
        projectId: "water-aa9c4",
        storageBucket: "water-aa9c4.firebasestorage.app",
        messagingSenderId: "839179323547",
        appId: "1:839179323547:web:cc0dff8998a7d1eed01e3e"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    const statusTxt = document.getElementById('status');
    const tokenBox = document.getElementById('token-box');
    const tokenTxt = document.getElementById('token-text');

    document.getElementById('setup-btn').onclick = () => {
        statusTxt.innerText = "Permission mangi ja rahi hai...";
        
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                statusTxt.innerText = "Permission mil gayi! Token nikal raha hai...";
                
                // Aapki VAPID Key yahan fit kar di hai
                messaging.getToken({ 
                    vapidKey: 'BI5jSs1B8FxuSC_icOCaLbvMSD3lPfTKM6ieFJqOXMWUKD8yZCMkPOzYX24AsqocVh_dEUEOgOg282foqApOJiA' 
                })
                .then((token) => {
                    if (token) {
                        tokenTxt.innerText = token;
                        tokenBox.style.display = 'block';
                        statusTxt.innerText = "✅ Setup Mukammal!";
                        console.log("Token generated:", token);
                    } else {
                        statusTxt.innerText = "❌ Token nahi mil saka. Settings check karein.";
                    }
                }).catch((err) => {
                    statusTxt.innerText = "❌ Error: " + err.message;
                    console.error(err);
                });
            } else {
                statusTxt.innerText = "❌ Aapne notifications block kar di hain.";
            }
        });
    };
</script>
</body>
</html>
