<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pani Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 rounded-[30px] shadow-xl max-w-sm w-full text-center">
        <h1 class="text-2xl font-bold text-blue-600 mb-2">Pani Reminder 💧</h1>
        <p class="text-gray-400 text-[10px] mb-6">Saudi Arabia Time (UTC+3)</p>

        <div id="scheduleContainer" class="space-y-3 mb-6 text-left">
            </div>

        <button onclick="setupNotifications()" class="text-xs text-blue-400 underline decoration-dotted">
            Setup Notifications 🔔
        </button>
        <div id="tokenArea" class="mt-4 p-2 bg-gray-50 border border-dashed rounded text-[8px] text-gray-400 break-all hidden"></div>
    </div>

    <script>
        const slots = [
            { id: 's1', time: '08:00 AM' },
            { id: 's2', time: '11:00 AM' },
            { id: 's3', time: '02:00 PM' },
            { id: 's4', time: '05:00 PM' },
            { id: 's5', time: '08:00 PM' },
            { id: 's6', time: '11:00 PM' }
        ];

        function renderSlots() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';
            
            const today = new Date().toDateString();
            if (localStorage.getItem('lastResetDate') !== today) {
                slots.forEach(s => localStorage.removeItem(s.id));
                localStorage.setItem('lastResetDate', today);
            }

            slots.forEach(slot => {
                const isDone = localStorage.getItem(slot.id) === 'done';
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100";
                
                div.innerHTML = `
                    <div>
                        <p class="text-sm font-bold text-gray-800">${slot.time}</p>
                        <p class="text-[10px] ${isDone ? 'text-green-500' : 'text-red-400'} font-bold">
                            ${isDone ? 'DONE ✅' : 'PENDING ⏳'}
                        </p>
                    </div>
                    ${!isDone ? `
                        <button onclick="markAsDone('${slot.id}')" class="bg-blue-500 text-white text-[10px] px-4 py-2 rounded-xl font-bold shadow-md">
                            DONE?
                        </button>
                    ` : '<span class="text-green-500 font-black text-[10px]">COMPLETED</span>'}
                `;
                container.appendChild(div);
            });
        }

        window.markAsDone = (id) => {
            if (confirm("Pani pi liya?")) {
                localStorage.setItem(id, 'done');
                renderSlots();
            }
        };

        async function setupNotifications() {
            alert("Checking Permissions...");
            // Yahan humne Firebase import ko simple rakha hai testing ke liye
            const permission = await Notification.requestPermission();
            if (permission === 'granted') alert("Permission Granted! Notifications ON.");
        }

        // फौरन render karein
        renderSlots();
    </script>
</body>
</html>
