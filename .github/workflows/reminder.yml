name: Water Reminder Automation
on:
  schedule:
    - cron: '0 2,5,8,11,14,17 * * *'
  workflow_dispatch:

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Get OAuth2 Token and Send Notification
        run: |
          # 1. JSON Secret se Private Key nikalna
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          
          # 2. Google ki library install karna token banane ke liye
          pip install google-auth
          
          # 3. Python script jo token banaye gi aur notification bheje gi
          python - <<EOF
          import json
          import requests
          from google.oauth2 import service_account
          import google.auth.transport.requests

          # Credentials load karein
          scoops = ['https://www.googleapis.com/auth/firebase.messaging']
          creds = service_account.Credentials.from_service_account_file('service-account.json', scopes=scoops)
          auth_request = google.auth.transport.requests.Request()
          creds.refresh(auth_request)
          token = creds.token

          # Notification ka data
          url = "https://fcm.googleapis.com/v1/projects/water-aa9c4/messages:send"
          headers = {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
          }
          
          payload = {
              "message": {
                  "token": "d7OyIRHiM55ud68XDsdTeM:APA91bHnfMMIwiOnGCFhZbHrecpNRGe2Cks03d6PiaiT3Eddyr46roKqXuuCRGD_8jXzb9eZvIjU59f4BPhqOxtZWNLjfmE4tu53Jx9g6zFwB_r2259xooE",
                  "notification": {
                      "title": "💧 Pani Peeyein!",
                      "body": "Haseeb Bhai, sehat ke liye ek glass pani peeyein."
                  }
              }
          }

          # Request bhejna
          response = requests.post(url, headers=headers, json=payload)
          print(response.status_code)
          print(response.text)
          EOF
