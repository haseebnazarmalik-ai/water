name: Water Reminder Automation
on:
  schedule:
    - cron: '0 2,5,8,11,14,17 * * *'
  workflow_dispatch:

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send FCM Notification
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          pip install google-auth requests
          python - <<EOF
          import json, requests, google.auth.transport.requests, google.oauth2.service_account
          scoops = ['https://www.googleapis.com/auth/firebase.messaging']
          creds = google.oauth2.service_account.Credentials.from_service_account_file('service-account.json', scopes=scoops)
          creds.refresh(google.auth.transport.requests.Request())
          headers = {'Authorization': 'Bearer ' + creds.token, 'Content-Type': 'application/json'}
          
          payload = {
              "message": {
                  "token": "fItb6dEkg04m6XwpCsP2zs:APA91bEiKrdKLviQrD_Q6v5LjZn0CTUjn_JpT8y9s73BZikDM5a5Gvyw9ERpvyLA2QCgG5GQgfHOLNYQ6QpnPH5S4DByEeo-zA1jCSHmJndabXcrJ4rTu3s",
                  "notification": {
                      "title": "💧 Pani Peeyein!",
                      "body": "Haseeb Bhai, sehat ke liye ek glass pani peeyein."
                  },
                  "android": { "priority": "high" },
                  "webpush": {
                      "headers": { "Urgency": "high" },
                      "fcm_options": { "link": "https://haseebnazarmalik-ai.github.io/water/" }
                  }
              }
          }
          
          response = requests.post("https://fcm.googleapis.com/v1/projects/water-aa9c4/messages:send", headers=headers, json=payload)
          print(f"Status: {response.status_code}")
          print(f"Response: {response.text}")
          EOF
